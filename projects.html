  <style>
    .graph-hint {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 8px;
    }
    .project-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      margin-top: 40px;
      padding: 0 64px 72px;
    }
    .proj-row {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      text-decoration: none;
      transition: all var(--t);
    }
    .proj-row:hover {
      border-color: rgba(26,31,54,0.20);
      background: rgba(26,31,54,0.05);
      transform: translateX(4px);
    }
    .proj-num {
      font-family: 'DM Serif Display', serif;
      font-style: italic;
      font-size: 26px;
      font-weight: 400;
      color: var(--sand-dark);
      min-width: 36px;
    }
    .proj-info { flex: 1; }
    .proj-name {
      font-family: var(--font-serif-ko);
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 3px;
    }
    .proj-desc { font-family: var(--font-body); font-size: 12px; color: var(--text-muted); }
    .proj-arrow { color: var(--coral); font-size: 18px; }
    @media (max-width: 768px) {
      .project-list { grid-template-columns: 1fr; padding: 0 28px 48px; }
    }
  </style>
</head>
